metadata:
  author: Ryan Kovar, David Herrald, James Brodsky, John Stoner, Jim Apger, David
    Veuve (Splunk)
  created: '2026'
  data_sources:
  - name: Network Traffic
    sourcetypes:
    - stream:dns
    - stream:http
    - stream:ftp
    - stream:smtp
    - stream:mysql
    - stream:smb
    - stream:arp
    - stream:dhcp
  - name: Windows Logs
    sourcetypes:
    - WinEventLog:Security
    - WinEventLog:Application
    - WinEventLog:System
    - XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
  - name: Unix/Linux Logs
    sourcetypes:
    - linux_secure
    - auditd
    - syslog
  - name: Application Logs
    sourcetypes:
    - apache:access
    - mysql:server
    - weblogic
  - name: Performance Metrics
    sourcetypes:
    - perfmon:cpu
    - perfmon:memory
    - collectd
  - name: Endpoint Protection
    sourcetypes:
    - symantec:ep:security:file
    - symantec:ep:packet:file
    - suricata
  description: Boss of the SOC v2 - Sample security dataset and CTF platform with
    100+ sourcetypes covering network, endpoint, cloud, and application data, with
    timestamps rebased to 2026 (2026-02-01 through 2026-03-04)
  license: CC0-1.0
  name: botsv2-2026
  tags:
  - bots
  - ctf
  - competition
  - multi-source
  - windows
  - linux
  - network
  - aws
  - application
  timestamp_range:
    earliest: '2026-02-01T00:00:01+00:00'
    field: _time
    latest: '2026-03-04T00:00:00+00:00'
  version: 2026.1.0
