metadata:
  author: Ryan Kovar, David Herrald, James Brodsky (Splunk)
  created: '2026'
  description: Boss of the SOC v1 - Sample security dataset and CTF platform with
    realistic attack scenarios captured in 2016. Two attacks by a fictitious hacktivist
    group called po1s0n1vy targeting Wayne Corp, with timestamps rebased to 2026 (2026-02-01
    through 2026-02-28)
  license: CC0-1.0
  name: botsv1-2026
  tags:
  - bots
  - ctf
  - competition
  - multi-source
  - windows
  - network
  - ids
  timestamp_range:
    earliest: '2026-02-01T18:00:00+00:00'
    field: _time
    latest: '2026-02-28T23:59:59+00:00'
  version: 2026.1.0
