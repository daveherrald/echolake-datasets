environment:
  host:
    hostname: ACME-WS02
    os: Windows 11 Enterprise Evaluation
    os_version: 10.0.22631
    architecture: x86_64
    domain: acme.local
    platform: Proxmox/QEMU
  execution:
    user: NT AUTHORITY\SYSTEM
    method: QEMU guest agent
    tool: Atomic Red Team
    tool_version: v4.0 (329 techniques)
    isolation: per-test cleanup
  collection:
    collector: Cribl Edge
    channels:
    - Microsoft-Windows-Sysmon/Operational
    - Security
    - Microsoft-Windows-PowerShell/Operational
  windows:
    sysmon:
      installed: true
      version: '15.15'
      config_source: sysmon-modular (Olaf Hartong)
      config_hash: SHA256=4516404FA30EE87CEA558567820CDC78863CC4AB07889519E49EAC3CCA92E0D2
      hashing_algorithms:
      - SHA1
      - MD5
      - SHA256
      - IMPHASH
      network_connect: true
      image_load: true
      dns_query: true
      process_create_mode: include
      notes: Filtered config — ProcessCreate uses include rules matching known-suspicious patterns (LOLBins, accessibility
        bypass, fltmc, attrib, sc, etc). Not all process creations are captured in Sysmon. Security 4688 with command-line
        auditing provides complementary full coverage.
    audit_policy:
      process_creation: success
      process_termination: success
      command_line_logging: true
      logon: success_and_failure
      special_logon: success_and_failure
      object_access: none
      account_management: none
      policy_change: none
      privilege_use: none
      token_right_adjusted: success
      kerberos: success_and_failure
      credential_validation: success_and_failure
    powershell:
      script_block_logging: true
      script_block_invocation: true
      module_logging: true
      module_logging_scope: '*'
      transcription: true
    endpoint_protection:
      product: Windows Defender
      version: 4.18.26010.5
      real_time_protection: true
      behavior_monitoring: true
      amsi_enabled: true
      signature_version: 1.445.536.0
      notes: Fully active during all test executions. Many techniques are blocked before completion, producing attempt telemetry
        (process creation, command lines) but not success telemetry (LSASS access, file dumps, network connections).
