metadata:
  name: paws-operation-yarn-ball
  version: 1.0.0
  description: >-
    PAWS (Pawsitive Vibes) Operation Yarn Ball - Full multi-stage attack simulation
    on a Windows Active Directory environment with 7 VMs. Includes agentic persona
    simulation (6 employees generating realistic background activity) plus a 10-stage
    Sliver C2 attack chain covering recon, beacon deployment, credential harvesting,
    lateral movement via WinRM/PsExec, data exfiltration, ransomware, and log clearing.
    ~820K events across Windows (Sysmon, Security, PowerShell), Squid proxy, and Zeek
    network logs.
  author: EchoLake Project
  created: '2026-03-18'
  license: CC0-1.0
  tags:
  - paws
  - operation-yarn-ball
  - ctf
  - attack-simulation
  - agentic-simulation
  - sliver-c2
  - windows
  - active-directory
  - sysmon
  - zeek
  - proxy
  - lateral-movement
  - ransomware
  - credential-access
  - exfiltration
  - multi-host
  - echolake
  mitre_attack:
    techniques:
    - id: T1082
      name: System Information Discovery
      tactics: [discovery]
    - id: T1016
      name: System Network Configuration Discovery
      tactics: [discovery]
    - id: T1033
      name: System Owner/User Discovery
      tactics: [discovery]
    - id: T1069
      name: Permission Groups Discovery
      tactics: [discovery]
    - id: T1018
      name: Remote System Discovery
      tactics: [discovery]
    - id: T1071
      name: Application Layer Protocol
      tactics: [command-and-control]
    - id: T1071.004
      name: 'Application Layer Protocol: DNS'
      tactics: [command-and-control]
    - id: T1218
      name: System Binary Proxy Execution
      tactics: [defense-evasion]
    - id: T1053
      name: Scheduled Task/Job
      tactics: [execution, persistence, privilege-escalation]
    - id: T1547.001
      name: 'Boot or Logon Autostart Execution: Registry Run Keys'
      tactics: [persistence, privilege-escalation]
    - id: T1552
      name: Unsecured Credentials
      tactics: [credential-access]
    - id: T1021.006
      name: 'Remote Services: Windows Remote Management'
      tactics: [lateral-movement]
    - id: T1021.002
      name: 'Remote Services: SMB/Windows Admin Shares'
      tactics: [lateral-movement]
    - id: T1569.002
      name: 'System Services: Service Execution'
      tactics: [execution]
    - id: T1041
      name: Exfiltration Over C2 Channel
      tactics: [exfiltration]
    - id: T1486
      name: Data Encrypted for Impact
      tactics: [impact]
    - id: T1070.001
      name: 'Indicator Removal: Clear Windows Event Logs'
      tactics: [defense-evasion]
    tactics:
    - discovery
    - command-and-control
    - defense-evasion
    - execution
    - persistence
    - privilege-escalation
    - credential-access
    - lateral-movement
    - exfiltration
    - impact
  timestamp_range:
    earliest: '2026-03-18T00:00:00Z'
    latest: '2026-03-18T14:48:57Z'
    field: _time
