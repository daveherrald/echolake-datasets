environment:
  host:
    hostname: PAWS-DC01, PAWS-EXEC01, PAWS-IT01, PAWS-WS01, PAWS-WS02, PAWS-WS03, PAWS-WS04
    os: Windows Server 2022 / Windows 11 Enterprise
    os_version: '10.0'
    architecture: x86_64
    domain: pawsitivevibes.local
    platform: Proxmox/QEMU
  execution:
    user: badactors
    method: QEMU guest agent + Sliver C2
    tool: badactors persona engine + paws-attack.py
    tool_version: 'March 2026'
    isolation: dedicated VLAN (192.168.4.20-26)
  collection:
    collector: Cribl Edge
    channels:
    - Microsoft-Windows-Sysmon/Operational
    - Security
    - Microsoft-Windows-PowerShell/Operational
    - Microsoft-Windows-WMI-Activity/Operational
    - Microsoft-Windows-TaskScheduler/Operational
    - System
    - Application
    - Squid Access Log
    - Zeek conn/dns/http
  windows:
    sysmon:
      installed: true
      version: '15.15'
      config_source: sysmon-modular (Olaf Hartong)
      hashing_algorithms: [SHA1, MD5, SHA256, IMPHASH]
      network_connect: true
      image_load: true
      dns_query: true
      process_create_mode: include
    audit_policy:
      process_creation: success
      process_termination: success
      command_line_logging: true
      logon: success_and_failure
    powershell:
      script_block_logging: true
      module_logging: true
  network:
    zeek:
      installed: true
      logs: [conn, dns, http]
      capture_point: PAWS VLAN span port
    proxy:
      type: Squid
      host: PAWS-DC01 (192.168.4.20)
      port: 3128
provenance:
  build:
    timestamps:
      start_epoch: 1773792000
      end_epoch: 1773845337
    tool: badactors + paws-attack.py
    notes: >-
      Background activity generated by agentic persona engine (6 personas with
      LLM-driven day plans). Attack executed by paws-attack.py driving Sliver C2
      framework through 10 stages (1, 2, 2b, 2c, 2d, 3, 3b, 4, 4b, 5, 6, 7).
      C2 infra at 192.168.4.200. Beacon traffic routed through Squid proxy on DC01.
