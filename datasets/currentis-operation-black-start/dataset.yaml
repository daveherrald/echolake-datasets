metadata:
  name: currentis-operation-black-start
  version: 1.0.0
  description: >-
    Operation Black Start - a fictional ICS/OT intrusion at the fictional utility "Currentis Energy"
    (domain currentis.local), built as replayable synthetic security telemetry for detection
    engineering, threat hunting, and SOC-investigation training. Eight-stage kill chain: agentic
    prompt-injection initial access (a poisoned NERC CIP-010 document read by a local AI coding
    assistant), living-off-the-land recon, a Sliver HTTP C2 beacon, LSASS credential theft, an
    IT-to-OT pivot using a stolen turbine-vendor remote-access account (helixgrid-svc) RDP'ing into
    the SCADA jump host, Unit 3 turbine-config reads, low-and-slow exfiltration over the C2 channel,
    and a Security event-log clear. The climax is quiet OT pre-positioning, not detonation - a
    setpoint-modification capability is staged on the wind-farm controller and never fired. Includes
    roughly 3.5 hours of multi-host baseline office activity from 7 personas as the haystack. The C2
    address has been rewritten to a publicly documented Cobalt Strike indicator (121.43.243.13) so a
    low-confidence "outbound to a possible C2 indicator" threat-intel detection fires on replay.
    Fictional actor GLACIER DRIFT - modeled on, not attributed to, public reporting.
  author: EchoLake Project
  created: '2026-06-09'
  license: CC0-1.0
  tags:
  - currentis
  - operation-black-start
  - ics
  - ot
  - scada
  - prompt-injection
  - agentic-ai
  - sliver-c2
  - cobalt-strike
  - lateral-movement
  - it-to-ot
  - credential-access
  - exfiltration
  - threat-intel
  - windows
  - sysmon
  - zeek
  - multi-host
  - echolake
